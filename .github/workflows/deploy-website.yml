# Publishes site/ to GitHub Pages (famemu.aulenor.com).
# One-time: DNS CNAME famemu → <github-user>.github.io; Settings → Pages →
# custom domain famemu.aulenor.com + Enforce HTTPS. (configure-pages
# self-enables Pages on the first run.)
name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
